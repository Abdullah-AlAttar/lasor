name: Release

# Runs on every push to a semver tag (e.g. v0.2.0).
# Creates a GitHub Release and uploads platform binaries.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: lasor.exe
            asset: lasor-windows-x86_64.exe

          - name: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: lasor
            asset: lasor-linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Linux only: install display-server and GPU libs ──────────────────
      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # ── Rename binary to include platform suffix ─────────────────────────
      - name: Stage binary (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" `
                    "${{ matrix.asset }}"

      - name: Stage binary (Linux)
        if: matrix.name == 'linux'
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
             "${{ matrix.asset }}"

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # --------------------------------------------------------------------------
  # Collect all platform binaries and publish a GitHub Release
  # --------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "lasor ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*
